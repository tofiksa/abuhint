server:
  port: 8080

spring:
  jwt:
    secret: ${JOSEFUS_JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
github:
  repository-url: ${GITHUB_REPO_URL}
  repo-token: ${GITHUB_JOSEFUS_TOKEN}
# LangChain4j properties
langchain4j:
  open-ai:
    chat-model:
      api-key: ${EASTER_API_KEY}
      model-name: gpt-4.1-mini
      log-requests: false
      log-responses: false
      temperature: 1
      max_completion_tokens: 1024
      top-p: 1.0
      frequency-penalty: 0.0
      presence-penalty: 0.0
      custom-parameters:
        prompt_cache_key: "abuhint-system-v1"
        prompt_cache_retention: "24h"
    streaming-chat-model:
      api-key: ${EASTER_API_KEY}
      model-name: gpt-4.1-mini
      temperature: 1
      max_completion_tokens: 1024
      top-p: 1.0
      frequency-penalty: 0.0
      presence-penalty: 0.0
      custom-parameters:
        prompt_cache_key: "abuhint-system-v1"
        prompt_cache_retention: "24h"
  gemini:
    api-key: ${GEMINIAI_API_KEY} # Hent nøkkelen fra en miljøvariabel
    project-id: ${GCP_PROJECT_ID} # Hent Google Cloud Project ID fra miljøvariabel
    location: ${GCP_LOCATION} # Hent Google Cloud Lokasjon (f.eks. "us-central1") fra miljøvariabel
    model-name: gemini-2.5-flash
    max-output-tokens: 768
    timeout:
      connect: 5s
      read: 15s
pinecone:
  api-key: ${PINECONE_API_KEY}
web-search:
  enabled: ${WEB_SEARCH_ENABLED:true}
  provider: ${WEB_SEARCH_PROVIDER:tavily}
  api-key: ${WEB_SEARCH_API_KEY:}
  base-url: ${WEB_SEARCH_BASE_URL:https://api.tavily.com}
  timeout-ms: ${WEB_SEARCH_TIMEOUT_MS:5000}
  max-results: ${WEB_SEARCH_MAX_RESULTS:6}
  locale: ${WEB_SEARCH_LOCALE:nb-NO}
  search-depth: ${WEB_SEARCH_SEARCH_DEPTH:basic}
  max-age-days: ${WEB_SEARCH_MAX_AGE_DAYS:30}
logging:
  level:
    dev:
      langchain4j: DEBUG
      ai4j.openai4j: DEBUG
    ai:
      djl: DEBUG
  file:
    name: logs/abuhint.log
  output:
    ansi:
      enabled: ALWAYS
s3:
  bucket: ${S3_BUCKET:}
  region: ${AWS_REGION:}
  key-prefix: ${S3_KEY_PREFIX:pptx/}
  presign-ttl-minutes: ${S3_PRESIGN_TTL_MINUTES:60}
resend:
  api-key: ${RESEND_API_KEY}
  api-url: https://api.resend.com
  from: ${RESEND_FROM_EMAIL}
  subject: AbuHintsPresentation
  pptx-email-template: |-
    <!doctype html>
    <html>
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Presentation Ready</title>
      </head>
      <body style="margin:0;padding:0;background-color:#f6f7fb;font-family:Arial, sans-serif;color:#1f2937;">
        <table role="presentation" cellspacing="0" cellpadding="0" width="100%" style="background-color:#f6f7fb;padding:24px 0;">
          <tr>
            <td align="center">
              <table role="presentation" cellspacing="0" cellpadding="0" width="600" style="background-color:#ffffff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
                <tr>
                  <td style="padding:28px 32px 12px 32px;">
                    <h1 style="margin:0;font-size:20px;line-height:1.3;color:#111827;">Your PowerPoint is ready</h1>
                  </td>
                </tr>
                <tr>
                  <td style="padding:0 32px 20px 32px;">
                    <p style="margin:0 0 12px 0;font-size:14px;line-height:1.5;">
                      Your presentation <strong>{{title}}</strong> is ready as <strong>{{fileName}}</strong>.
                    </p>
                    <p style="margin:0 0 12px 0;font-size:14px;line-height:1.5;">
                      Download: <a href="{{downloadUrl}}" style="color:#2563eb;">{{downloadUrl}}</a>
                    </p>
                    <p style="margin:0;font-size:14px;line-height:1.5;">
                      Let me know if you want edits, additional slides, or a different theme.
                    </p>
                  </td>
                </tr>
                <tr>
                  <td style="padding:16px 32px 24px 32px;border-top:1px solid #e5e7eb;font-size:12px;color:#6b7280;">
                    Generated by Abuhint
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </body>
    </html>
